name: Security audit

on:
  pull_request:
  schedule:
    - cron: '17 9 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend
        run: npm ci
        working-directory: backend

      - name: Install frontend
        run: npm ci
        working-directory: frontend

      - name: Audit backend
        run: npm run audit:security
        working-directory: backend

      - name: Audit frontend
        run: npm run audit:security
        working-directory: frontend

      - name: Backend syntax check
        shell: bash
        run: |
          find backend/src backend/scripts \( -name '*.js' -o -name '*.mjs' \) -print | xargs -r node --check

      - name: Build frontend
        run: npm run build
        working-directory: frontend
