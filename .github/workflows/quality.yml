name: Product quality

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend
        run: npm ci
        working-directory: backend

      - name: Install frontend
        run: npm ci
        working-directory: frontend

      - name: Validate Prisma
        run: npm run prisma:validate
        working-directory: backend

      - name: Typecheck frontend
        run: npx tsc -b
        working-directory: frontend

      - name: Build complete product
        run: npm run build

      - name: Unit tests
        run: npm run test:unit
        working-directory: backend

      - name: Offline AI evaluation
        run: npm run ai:eval:offline
        working-directory: backend

      - name: Backend production dependency audit
        run: npm audit --omit=dev --audit-level=high
        working-directory: backend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Critical route smoke test
        run: npm run test:e2e
        working-directory: frontend
        env:
          PERF_STRICT: '1'

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7
